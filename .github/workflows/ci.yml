name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validation:
    name: Validation (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node:
          - "18"
          - "20"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Run English-first repository checks
        run: npm run test:english-foundation

      - name: Run generated skill doc drift check
        run: npm run test:generated-skill-docs

      - name: Run smoke test
        run: npm run smoke
